<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتیجه تریاژ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- ====== لوگوی آزمایشگاه ====== -->
        <div style="text-align:center; margin-bottom:5px;">
            <div style="display:inline-block; background:linear-gradient(135deg,#1e40af,#3b82f6); padding:15px 18px; border-radius:50%; box-shadow:0 8px 30px rgba(59,130,246,0.4); border:4px solid white;">
                <span style="font-size:45px; display:block; line-height:1;">🔬</span>
                <span style="display:block; color:#fff; font-size:11px; font-weight:bold; margin-top:2px;">آزمایشگاه</span>
            </div>
        </div>

        <!-- ====== بقیه کد ====== -->
        <h1>📊 نتیجه تریاژ</h1>

        <!-- نمایش نام بیمار -->
        <div id="greeting" style="background: #e0f2fe; padding: 12px 16px; border-radius: 16px; text-align: center; font-weight: bold; margin-bottom: 20px; color: #075985;">
            👤 بیمار: <span id="userNameDisplay">نامشخص</span>
        </div>

        <!-- نمایش نتیجه -->
        <div id="result" style="padding: 20px; border-radius: 16px; text-align: center; font-weight: bold; font-size: 18px;">
            در حال تحلیل...
        </div>

        <button onclick="window.location.href='triage.html'" style="margin-top: 20px; width:100%; padding:14px; border:none; border-radius:50px; background:linear-gradient(to left, #2563eb, #7c3aed); color:white; font-size:18px; font-weight:bold; cursor:pointer; box-shadow:0 8px 25px rgba(37,99,235,0.3);">
            🔄 بازگشت به ثبت علائم
        </button>
    </div>

    <script>
        window.onload = function() {
            // نمایش نام بیمار
            const savedName = localStorage.getItem('userName');
            if (savedName) {
                document.getElementById('userNameDisplay').textContent = savedName;
            } else {
                document.getElementById('userNameDisplay').textContent = 'بیمار (ثبت‌نام نشده)';
            }

            // گرفتن اطلاعات از URL
            const params = new URLSearchParams(window.location.search);
            const temp = parseFloat(params.get('temp')) || 0;
            const fever = params.get('fever');
            const cough = params.get('cough');
            const dyspnea = params.get('dyspnea');
            const throat = params.get('throat');
            const headache = params.get('headache');
            const pain = params.get('pain');

            const resultDiv = document.getElementById('result');
            let level = 'green';
            let message = '';

            // ---- منطق تشخیص ----
            if (temp >= 39 || dyspnea === 'yes' || (fever === 'yes' && temp >= 38)) {
                level = 'red';
                message = '🚨 سطح خطر: قرمز (نیاز به اقدام فوری پزشکی!)';
            } else if (temp >= 38 || fever === 'yes' || cough === 'yes' || throat === 'yes' || pain === 'high') {
                level = 'orange';
                message = '⚠️ سطح خطر: نارنجی (نیاز به بررسی سریع توسط پزشک)';
            } else {
                level = 'green';
                message = '✅ سطح خطر: سبز (وضعیت پایدار است، نیاز به مراقبت معمول)';
            }

            // ---- دریافت تاریخ و ساعت ایران ----
            const now = new Date();
            const persianDate = now.toLocaleDateString('fa-IR', {
                timeZone: 'Asia/Tehran'
            });
            const persianTime = now.toLocaleTimeString('fa-IR', {
                hour: '2-digit',
                minute: '2-digit',
                timeZone: 'Asia/Tehran'
            });

            // نمایش نتیجه با رنگ مناسب
            resultDiv.className = level === 'red' ? 'danger' : (level === 'orange' ? 'warning' : 'success');
            resultDiv.innerHTML = message;

            // اضافه کردن نام بیمار
            const name = localStorage.getItem('userName') || 'بیمار';
            resultDiv.innerHTML += `<br><small style="font-size:14px; color:#475569; display:block; margin-top:10px;">👤 نام بیمار: ${name}</small>`;

            // اضافه کردن تاریخ و ساعت ایران
            resultDiv.innerHTML += `<br><small style="font-size:13px; color:#64748b; display:block; margin-top:5px;">🕐 تاریخ و ساعت ثبت: ${persianDate} - ${persianTime}</small>`;
        };
    </script>
</body>

</html>
