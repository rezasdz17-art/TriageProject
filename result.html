<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نتیجه تریاژ</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>📊 نتیجه تریاژ</h1>

        <!-- نمایش نام بیمار -->
        <div id="greeting" style="background: #e0f2fe; padding: 12px 16px; border-radius: 16px; text-align: center; font-weight: bold; margin-bottom: 20px; color: #075985;">
            👤 بیمار: <span id="userNameDisplay">نامشخص</span>
        </div>

        <!-- نمایش نتیجه -->
        <div id="result" style="padding: 20px; border-radius: 16px; text-align: center; font-weight: bold; font-size: 18px;">
            در حال تحلیل...
        </div>

        <button onclick="window.location.href='triage.html'" style="margin-top: 20px;">
            🔄 بازگشت به ثبت علائم
        </button>
    </div>

    <script>
        window.onload = function() {
            // نمایش نام بیمار
            const savedName = localStorage.getItem('userName');
            if (savedName) {
                document.getElementById('userNameDisplay').textContent = savedName;
            } else {
                document.getElementById('userNameDisplay').textContent = 'بیمار (ثبت‌نام نشده)';
            }

            // گرفتن اطلاعات از URL (با اسم‌های انگلیسی جدید)
            const params = new URLSearchParams(window.location.search);
            const temp = parseFloat(params.get('temp')) || 0;
            const fever = params.get('fever');
            const cough = params.get('cough');
            const dyspnea = params.get('dyspnea');
            const throat = params.get('throat');
            const headache = params.get('headache');
            const pain = params.get('pain');

            const resultDiv = document.getElementById('result');
            let level = 'green';
            let message = '';

            // ---- منطق تشخیص (همان قبلی) ----
            if (temp >= 39 || dyspnea === 'yes' || (fever === 'yes' && temp >= 38)) {
                level = 'red';
                message = '🚨 سطح خطر: قرمز (نیاز به اقدام فوری پزشکی!)';
            } else if (temp >= 38 || fever === 'yes' || cough === 'yes' || throat === 'yes' || pain === 'high') {
                level = 'orange';
                message = '⚠️ سطح خطر: نارنجی (نیاز به بررسی سریع توسط پزشک)';
            } else {
                level = 'green';
                message = '✅ سطح خطر: سبز (وضعیت پایدار است، نیاز به مراقبت معمول)';
            }

            // نمایش نتیجه با رنگ مناسب
            resultDiv.className = level === 'red' ? 'danger' : (level === 'orange' ? 'warning' : 'success');
            resultDiv.innerHTML = message;

            // اضافه کردن نام بیمار
            const name = localStorage.getItem('userName') || 'بیمار';
            resultDiv.innerHTML += `<br><small style="font-size:14px; color:#475569; display:block; margin-top:10px;">👤 نام بیمار: ${name}</small>`;
        };
    </script>
</body>

</html>
