<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت علائم بیمار</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🩺 ثبت علائم بیمار</h1>

        <!-- نمایش نام بیمار ذخیره شده -->
        <div id="greeting" style="background: #e0f2fe; padding: 12px 16px; border-radius: 16px; text-align: center; font-weight: bold; margin-bottom: 20px; color: #075985;">
            👤 در حال تریاژ برای: <span id="userNameDisplay">بیمار</span>
        </div>

        <!-- name ها به انگلیسی تغییر کردند تا خطا ندهند -->
        <form action="result.html" method="GET">
            <label>دمای بدن (درجه)</label>
            <input type="number" name="temp" min="34" max="42" step="0.1" required>

            <label>تب</label>
            <select name="fever" required>
                <option value="">انتخاب کنید</option>
                <option value="yes">دارد</option>
                <option value="no">ندارد</option>
            </select>

            <label>سرفه</label>
            <select name="cough" required>
                <option value="">انتخاب کنید</option>
                <option value="yes">دارد</option>
                <option value="no">ندارد</option>
            </select>

            <label>تنگی نفس</label>
            <select name="dyspnea" required>
                <option value="">انتخاب کنید</option>
                <option value="yes">دارد</option>
                <option value="no">ندارد</option>
            </select>

            <label>گلودرد</label>
            <select name="throat" required>
                <option value="">انتخاب کنید</option>
                <option value="yes">دارد</option>
                <option value="no">ندارد</option>
            </select>

            <label>سردرد</label>
            <select name="headache" required>
                <option value="">انتخاب کنید</option>
                <option value="yes">دارد</option>
                <option value="no">ندارد</option>
            </select>

            <label>میزان درد</label>
            <select name="pain" required>
                <option value="">انتخاب کنید</option>
                <option value="low">کم</option>
                <option value="medium">متوسط</option>
                <option value="high">شدید</option>
            </select>

            <button type="submit">🤖 تحلیل علائم</button>
        </form>
    </div>

    <script>
        // نمایش نام کاربر از حافظه
        window.onload = function() {
            const savedName = localStorage.getItem('userName');
            if (savedName) {
                document.getElementById('userNameDisplay').textContent = savedName;
            } else {
                document.getElementById('userNameDisplay').textContent = 'بیمار (ثبت‌نام نشده)';
            }
        };
    </script>
</body>

  </html>
