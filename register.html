<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ثبت نام</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">

        <!-- ====== لوگو ====== -->
        <div style="text-align:center; margin-bottom:10px;">
            <div style="display:inline-block; background:linear-gradient(135deg,#1e40af,#3b82f6); padding:18px 20px; border-radius:50%; box-shadow:0 8px 30px rgba(59,130,246,0.4); border:4px solid white;">
                <span style="font-size:50px; display:block; line-height:1;">🧑‍⚕️</span>
                <span style="display:block; color:#fff; font-size:12px; font-weight:bold; margin-top:2px;">ثبت‌نام</span>
            </div>
        </div>

        <!-- ====== بقیه کد (دقیقاً مثل خودت) ====== -->
        <h1>📝 ثبت نام</h1>

        <form id="registerForm">
            <label>نام و نام خانوادگی</label>
            <input type="text" id="fullName" placeholder="نام و نام خانوادگی" required>

            <label>کد ملی</label>
            <input type="text" id="nationalCode" placeholder="کد ملی" maxlength="10" required>

            <label>سن</label>
            <input type="number" id="age" min="1" max="120" placeholder="سن" required>

            <label>جنسیت</label>
            <select id="gender" required>
                <option value="">انتخاب کنید</option>
                <option value="مرد">مرد</option>
                <option value="زن">زن</option>
            </select>

            <label>شماره موبایل</label>
            <input type="tel" id="phone" placeholder="09*********" required>

            <button type="submit">ادامه</button>
        </form>
    </div>

    <script>
        // وقتی فرم ارسال می‌شه، این تابع اجرا می‌شه
        document.getElementById('registerForm').addEventListener('submit', function(event) {
            event.preventDefault(); // جلوی رفتن خودکار صفحه رو می‌گیره

            // گرفتن مقادیر از فیلدها
            const fullName = document.getElementById('fullName').value.trim();
            const nationalCode = document.getElementById('nationalCode').value.trim();
            const age = document.getElementById('age').value.trim();
            const gender = document.getElementById('gender').value;
            const phone = document.getElementById('phone').value.trim();

            // اعتبارسنجی ساده (چک کردن خالی نبودن)
            if (!fullName || !nationalCode || !age || !gender || !phone) {
                alert('⚠️ لطفاً تمام فیلدها را پر کنید!');
                return;
            }

            // ذخیره در حافظه گوشی (localStorage)
            localStorage.setItem('userName', fullName);
            localStorage.setItem('userCode', nationalCode);
            localStorage.setItem('userAge', age);
            localStorage.setItem('userGender', gender);
            localStorage.setItem('userPhone', phone);

            // هدایت به صفحه ثبت علائم
            window.location.href = 'triage.html';
        });
    </script>
</body>

</html>
